<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="Form.css" />
  </head>
  <body>
     <form action="Form.html" method="post">
      <h2>Student Registration Form</h2>

      <label for="roll"> Roll No:</label>
      <input type="text" name="roll" name="roll" size="50" /><br /><br />

      <label> Student Name:</label>
      <input type="text" name="Name" placeholder="First Name" />
      <input type="text" name="Name" placeholder="Last Name" />
      <br /><br />

      <label> Father's Name:</label>
      <input type="text" name="father's Name" /><br /><br />

      <label>Date Of Birth</label>
      <input type="date" name="DOB" /> (DD-MM-YYYY) <br /><br />

      <label> Mobile No:</label>
      <input type="text" value="+234" size="3" readonly /> -
      <input type="tel" name="mobile" /><br /><br />

      <label> Email ID:</label>
      <input type="email" name="Email" /> <br /><br />

      <label>Password:</label>
      <input type="password" name="pw" /><br /><br />

      <label>Department</label>
      <input type="checkbox" /> CSE <input type="checkbox" /> IT
      <input type="checkbox" /> ECE <input type="checkbox" /> Civil
      <input type="checkbox" /> Mech <br /><br />

      <label> Gender</label>
      <input type="radio" id="Male" name="gender" value="male" />
      <label for="male">Male</label>
      <input type="radio" id="female" name="gender" value="female" />
      <label for="female">Female</label><br /><br />

      <lable> Course</lable>
      <select name="course">
        <option>---Select Current course----</option>
        <option>Computer Science</option>
        <option>Information Technology</option>
        <option>Mechine Learning</option>
        <option>Civil Engineering</option>
        <option>Cyber Security</option>
        <option>Electrical Engineering</option>
        <option>Artificial Inteligence</option>
        <option>Software Engineering</option>
        <option>Businesss Admin</option>
      </select>
      <br /><br />

      <label> Student Photo</label>
      <input type="file" /><br /><br />

      <label>City:</label>
      <input type="text" size="45" name="city" /> <br /><br />

      <label>Address</label> <br />
      <textarea name="address" rows="4" cols="40"></textarea> <br /><br />

      <input type="submit" value="Registrater" />
    </form>
  </body>
</html>
